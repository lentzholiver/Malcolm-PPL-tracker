function td(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fD(s){const[y,m,d]=s.split('-');return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]+' '+( +d);}
function fDF(s){return fD(s)+', '+s.split('-')[0];}
function fDow(s){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(s+'T12:00:00').getDay()];}
let tt;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),1800);}
function cyc(){const now=new Date(),diff=Math.floor((now-CYCLE_START)/(864e5)),week=Math.floor(diff/7)+1,day=diff+1,pct=Math.min(Math.round(diff/(56)*100),100),wi=Math.min(Math.max(week-1,0),CYCLE_WEEKS.length-1);return{week,day,pct,info:CYCLE_WEEKS[wi],diff};}
function switchTab(t){S.tab=t;document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');document.querySelectorAll('.nav-btn').forEach((b,i)=>{b.classList.toggle('active',['home','workout','stats','body','cycle','journal'][i]===t);});({home:rHome,workout:rWork,stats:rStats,body:rBody,cycle:rCycle,journal:rJournal})[t]();}

// WORKOUT HELPERS
function wK(){return`${S.workoutDate}_day${DAYS[S.activeDay].id}`;}
function wS(){return S.workouts[wK()]||{};}
function gES(i){const s=wS(),ex=DAYS[S.activeDay].exercises[i];return s[`ex${i}`]||Array.from({length:ex.sets},()=>({weight:'',reps:'',done:false}));}
function uS(ei,si,f,v){const k=wK();if(!S.workouts[k])S.workouts[k]={};const ek=`ex${ei}`,ex=DAYS[S.activeDay].exercises[ei];if(!S.workouts[k][ek])S.workouts[k][ek]=Array.from({length:ex.sets},()=>({weight:'',reps:'',done:false}));S.workouts[k][ek][si]={...S.workouts[k][ek][si],[f]:v};sv('ppl_w6',S.workouts);}
function tD(ei,si){const k=wK();if(!S.workouts[k])S.workouts[k]={};const ek=`ex${ei}`,ex=DAYS[S.activeDay].exercises[ei];if(!S.workouts[k][ek])S.workouts[k][ek]=Array.from({length:ex.sets},()=>({weight:'',reps:'',done:false}));S.workouts[k][ek][si].done=!S.workouts[k][ek][si].done;sv('ppl_w6',S.workouts);rWork();}
function gL(ei){const d=DAYS[S.activeDay],c=wK(),ks=Object.keys(S.workouts).filter(k=>k.endsWith(`_day${d.id}`)&&k!==c).sort().reverse();for(const k of ks){const s=S.workouts[k],ek=`ex${ei}`;if(s[ek]){const dn=s[ek].filter(x=>x.done&&x.weight);if(dn.length){const b=dn.reduce((a,c)=>parseFloat(c.weight)>parseFloat(a.weight)?c:a);return`${b.weight}×${b.reps}`;}}}return null;}
function gH(ei){const d=DAYS[S.activeDay],ent=[],ks=Object.keys(S.workouts).filter(k=>k.endsWith(`_day${d.id}`)).sort().reverse().slice(0,8);for(const k of ks){const dt=k.split('_day')[0],s=S.workouts[k],ek=`ex${ei}`;if(s[ek]){const dn=s[ek].filter(x=>x.done&&x.weight);if(dn.length){const b=dn.reduce((a,c)=>parseFloat(c.weight)>parseFloat(a.weight)?c:a);ent.push({date:dt,w:b.weight,r:b.reps});}}}return ent;}
function cL(ei){const d=DAYS[S.activeDay],c=wK(),ks=Object.keys(S.workouts).filter(k=>k.endsWith(`_day${d.id}`)&&k!==c).sort().reverse();for(const k of ks){const s=S.workouts[k],ek=`ex${ei}`;if(s[ek]){if(!S.workouts[c])S.workouts[c]={};S.workouts[c][ek]=s[ek].map(x=>({...x,done:false}));sv('ppl_w6',S.workouts);toast('Loaded');rWork();return;}}toast('No data');}
function gStreak(){const dates=new Set();Object.keys(S.workouts).forEach(k=>{const d=k.split('_day')[0],s=S.workouts[k];if(Object.values(s).some(a=>Array.isArray(a)&&a.some(x=>x.done)))dates.add(d);});if(!dates.size)return 0;function isSunday(dt){return dt.getDay()===0;}function dKey(dt){return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}let streak=0;const d=new Date();d.setHours(0,0,0,0);const t=td();const yd=new Date(d);yd.setDate(yd.getDate()-1);const ys=dKey(yd);if(!dates.has(t)&&!dates.has(ys)&&!isSunday(d))return 0;const ch=new Date(d);if(!dates.has(t)&&!isSunday(d))ch.setDate(ch.getDate()-1);while(true){const ks=dKey(ch);if(dates.has(ks)||isSunday(ch)){streak++;ch.setDate(ch.getDate()-1);}else break;}return streak;}
const EX_TO_LIFT={'Barbell Bench Press':'bench','Overhead Press':'ohp','Incline BB Press (45°)':'bench','Barbell Back Squat':'squat','Romanian Deadlift':'deadlift','Weighted Pull-Ups':'pullup','Barbell Bent-Over Row':'row','Weighted Dips':'dip','Barbell Curl':'curl','Incline DB Press (30°)':'bench','DB Shoulder Press':'ohp','T-Bar Row':'row','Front Squat':'squat','Hip Thrust (BB)':'deadlift','Lat Pulldown (Wide)':'row'};
function gPRs(){const prs={};STR_LIFTS.forEach(l=>{prs[l.key]={best:null,date:null};});
// From strength log
Object.keys(S.strength).sort().forEach(d=>{STR_LIFTS.forEach(l=>{const v=parseFloat(S.strength[d][l.key]);if(!isNaN(v)&&(prs[l.key].best===null||v>prs[l.key].best)){prs[l.key].best=v;prs[l.key].date=d;}});});
// From workout logs
Object.keys(S.workouts).forEach(k=>{const date=k.split('_day')[0];const dayId=parseInt(k.split('_day')[1]);const day=DAYS.find(d=>d.id===dayId);if(!day)return;const sess=S.workouts[k];day.exercises.forEach((ex,ei)=>{const liftKey=EX_TO_LIFT[ex.name];if(!liftKey)return;const sets=sess[`ex${ei}`];if(!sets)return;sets.forEach(s=>{if(s.done&&s.weight){const w=parseFloat(s.weight);if(!isNaN(w)&&(prs[liftKey].best===null||w>prs[liftKey].best)){prs[liftKey].best=w;prs[liftKey].date=date;}}});});});
const result=[];STR_LIFTS.forEach(l=>{if(prs[l.key].best!==null)result.push({...l,value:prs[l.key].best,date:prs[l.key].date});});return result.sort((a,b)=>b.date.localeCompare(a.date));}
function gSess(){const ds=new Set();Object.keys(S.workouts).forEach(k=>{const s=S.workouts[k];if(Object.values(s).some(a=>Array.isArray(a)&&a.some(x=>x.done)))ds.add(k.split('_day')[0]);});return ds.size;}
function gVol(){let v=0;Object.values(S.workouts).forEach(s=>{Object.values(s).forEach(a=>{if(Array.isArray(a))a.forEach(x=>{if(x.done&&x.weight&&x.reps)v+=parseFloat(x.weight)*parseFloat(x.reps)||0;});});});return v;}
function gTDI(){
// Sunday = rest day
if(new Date().getDay()===0)return null;
// Find the most recent workout day logged
const today=td();const keys=Object.keys(S.workouts).filter(k=>{const s=S.workouts[k];return Object.values(s).some(a=>Array.isArray(a)&&a.some(x=>x.done));}).sort().reverse();
// Check if already logged today — show that day
for(const k of keys){const d=k.split('_day')[0];if(d===today){const dayId=parseInt(k.split('_day')[1]);return DAYS.findIndex(x=>x.id===dayId);}}
// Find last logged day and suggest next in sequence
if(keys.length){const lastKey=keys[0];const lastDayId=parseInt(lastKey.split('_day')[1]);const lastIdx=DAYS.findIndex(x=>x.id===lastDayId);return(lastIdx+1)%6;}
// No history — start with Day 1
return 0;
}
function gWC(){const t=new Date(),sow=new Date(t);sow.setDate(t.getDate()-t.getDay()+1);let tot=0,dn=0;for(let i=0;i<6;i++){const d=new Date(sow);d.setDate(sow.getDate()+i);const dk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const ss=S.workouts[`${dk}_day${DAYS[i].id}`]||{};DAYS[i].exercises.forEach((ex,ei)=>{const st=ss[`ex${ei}`]||[];tot+=ex.sets;dn+=st.filter(x=>x.done).length;});}return tot?Math.round(dn/tot*100):0;}
function toggleDose(key,date){const d=date||td();if(!S.doses[d])S.doses[d]={};S.doses[d][key]=!S.doses[d][key];sv('ppl_d6',S.doses);if(S.tab==='home')rHome();else if(S.tab==='cycle')rCycle();}
function getDoseCount(date){const d=S.doses[date||td()]||{};return DOSES.filter(x=>d[x.key]).length;}

// ════════════════════ HOME ════════════════════
function rHome(){
  const streak=gStreak(),sessions=gSess(),wPct=gWC(),tdi=gTDI(),tDay=tdi!==null?DAYS[tdi]:null,prs=gPRs().slice(0,3),cy=cyc();
  const lw=Object.keys(S.body).sort().reverse().find(d=>S.body[d]?.weight),bw=lw?S.body[lw].weight:null;
  const todayDoses=S.doses[td()]||{},dosesDone=DOSES.filter(x=>todayDoses[x.key]).length;

  // Cycle mini banner
  h+=`<div style="padding:16px 24px 8px"><div class="cycle-banner" onclick="switchTab('cycle')" style="cursor:pointer">
    <div style="padding:16px 18px 12px;display:flex;justify-content:space-between;align-items:center">

      <div style="text-align:right"><div style="font-size:11px;color:var(--t3);font-weight:500">${cy.info.title}</div><div style="font-size:10px;color:var(--t4);margin-top:2px">${dosesDone}/${DOSES.length} doses today</div></div>
    </div>
    <div style="padding:0 18px 14px"><div style="height:4px;background:var(--bg3);border-radius:4px;overflow:hidden"><div style="height:100%;width:${cy.pct}%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));border-radius:4px"></div></div></div>
  </div></div>`;

  // Today's doses quick check
  h+=`<div style="padding:0 24px 8px"><div class="card">
    <div style="padding:12px 16px 8px;font-size:10px;letter-spacing:.15em;color:var(--t4);font-weight:600">TODAY'S DOSES</div>`;
  DOSES.forEach(dose=>{const taken=todayDoses[dose.key];
    h+=`<div class="dose-row" style="padding:10px 16px"><div style="display:flex;align-items:center;gap:10px;flex:1"><span style="font-size:16px">${dose.icon}</span><div><div style="font-size:12px;font-weight:600;color:${taken?'var(--t4)':'var(--t2)'};${taken?'text-decoration:line-through':''}">${dose.name} — ${dose.detail}</div><div style="font-size:10px;color:var(--t5)">${dose.time}</div></div></div><button class="dose-check ${taken?'taken':''}" onclick="event.stopPropagation();toggleDose('${dose.key}')">${taken?'✓':''}</button></div>`;
  });

  // Quick stats

  // Week progress
  h+=`<div style="padding:8px 24px 16px"><div class="card" style="padding:16px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="font-size:13px;font-weight:600;color:var(--t2)">This Week</div><div style="font-family:var(--mono);font-size:12px;color:var(--t3);font-weight:600">${wPct}%</div></div><div class="progress-track" style="height:5px;border-radius:5px"><div class="progress-bar" style="width:${wPct}%;background:linear-gradient(90deg,var(--red),var(--yellow));border-radius:5px"></div></div></div></div>`;

  // Today's workout
  if(tDay){const ts=S.workouts[`${td()}_day${tDay.id}`]||{};let tT=0,tDn=0;tDay.exercises.forEach((ex,ei)=>{const ss=ts[`ex${ei}`]||[];tT+=ex.sets;tDn+=ss.filter(x=>x.done).length;});const tP=tT?Math.round(tDn/tT*100):0;
    h+=`<div class="section-head"><div class="section-tag">TODAY</div><div class="section-title">${tDay.label}</div></div><div style="padding:0 24px 16px"><div class="today-card" onclick="S.activeDay=${tdi};S.workoutDate=td();switchTab('workout')"><div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)"><div style="font-size:12px;color:var(--t3)">${tDay.focus}</div><div style="font-family:var(--display);font-size:28px;color:${tP===100?'var(--green)':tDay.color}">${tP}%</div></div>`;

  h+=`</div>`;// close padding

}

// ════════════════════ WORKOUT ════════════════════
function rWork(){
  const day=DAYS[S.activeDay],cy=cyc();let tS=0,dS=0;day.exercises.forEach((ex,i)=>{const s=gES(i);tS+=ex.sets;dS+=s.filter(x=>x.done).length;});const pct=tS?Math.round(dS/tS*100):0;
  let h=`<div style="border-bottom:1px solid var(--border);padding:24px 24px 20px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px"><div><div style="font-size:10px;letter-spacing:.2em;color:var(--t4);font-weight:600">6-DAY PPL SPLIT</div><div style="font-family:var(--display);font-size:clamp(28px,5vw,44px);line-height:1;letter-spacing:.04em;margin-top:4px">WORKOUT</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><input type="date" value="${S.workoutDate}" onchange="S.workoutDate=this.value;S.expandedEx=null;rWork()" style="width:148px;font-size:12px;padding:7px 10px;background:var(--bg2)"><button class="btn" onclick="delete S.workouts[wK()];sv('ppl_w6',S.workouts);toast('Cleared');rWork()">RESET</button></div></div>`;
  h+=`<div style="padding:12px 24px 8px"><div style="background:var(--bg2);border-left:3px solid var(--yellow);padding:10px 14px;border-radius:0 6px 6px 0;font-size:11px;color:var(--t3);line-height:1.6"><span style="color:var(--yellow);font-weight:600">WEEK ${cy.week}</span> — ${cy.info.overall.split('.')[0]}.</div></div>`;
  h+=`<div class="day-tabs">`;DAYS.forEach((d,i)=>{const dk=`${S.workoutDate}_day${d.id}`,ds=S.workouts[dk]||{};let dt=0,dd=0;d.exercises.forEach((ex,ei)=>{const ss=ds[`ex${ei}`]||[];dt+=ex.sets;dd+=ss.filter(x=>x.done).length;});const dp=dt?Math.round(dd/dt*100):0;h+=`<button class="day-tab ${S.activeDay===i?'active':''}" onclick="S.activeDay=${i};S.expandedEx=null;rWork()" style="${S.activeDay===i?`border-bottom-color:${d.color}`:''}"><div style="font-size:clamp(7px,1.1vw,9px);letter-spacing:.12em;color:${S.activeDay===i?'var(--t4)':'var(--t5)'};margin-bottom:2px;font-weight:500">DAY ${d.id}</div><div style="font-family:var(--display);font-size:clamp(12px,2.2vw,18px)">${d.label}</div>${dp>0?`<div style="margin:6px 6px 0;height:2px;background:var(--bg3);border-radius:2px"><div style="height:100%;width:${dp}%;background:${d.color};border-radius:2px;opacity:${dp===100?.9:.5}"></div></div>`:''}</button>`;});h+=`</div>`;
  h+=`<div style="padding:0 24px"><div style="display:flex;align-items:center;justify-content:space-between;padding:18px 0 6px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:14px;font-weight:600;color:var(--t2)">${day.label}</span><span style="padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;background:${day.color}18;color:${day.color}">${day.tag}</span></div><span style="font-size:13px;font-weight:600;font-family:var(--mono);color:${pct===100?'var(--green)':'var(--t3)'}">${pct===100?'✓ DONE':pct+'%'}</span></div><div class="progress-track"><div class="progress-bar" style="width:${pct}%;background:${day.color};opacity:.75"></div></div></div>`;
  h+=`<div style="padding:14px 24px 10px"><div style="font-size:12px;color:var(--t3);font-weight:500;margin-bottom:10px">${day.focus}</div><div style="background:var(--bg2);border-left:3px solid ${day.color}44;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--t3);line-height:1.7;border-radius:0 6px 6px 0">${day.note}</div></div>`;
  h+=`<div style="padding:0 24px 20px">`;
  day.exercises.forEach((ex,ei)=>{const sets=gES(ei),allD=sets.every(x=>x.done),dN=sets.filter(x=>x.done).length,last=gL(ei),isE=S.expandedEx===ei,hist=isE?gH(ei):[];
    h+=`<div class="ex-block" style="${allD?`border-color:${day.color}30`:''}"><div class="ex-header" onclick="S.expandedEx=S.expandedEx===${ei}?null:${ei};rWork()"><div style="flex:1"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><span style="font-size:11px;color:${day.color};opacity:.6;font-weight:700;min-width:16px;font-family:var(--mono)">${String(ei+1).padStart(2,'0')}</span><span style="font-size:14px;font-weight:600;color:${allD?'var(--t4)':'var(--t1)'};${allD?`text-decoration:line-through;text-decoration-color:${day.color}55`:''}">${ex.name}</span>${dN>0&&!allD?`<span style="font-size:10px;color:var(--t4);font-family:var(--mono)">${dN}/${ex.sets}</span>`:''}</div><div style="font-size:11px;color:var(--t4);margin-left:26px;font-family:var(--mono)">RPE ${ex.rpe} · ${ex.sets}×${ex.reps}${last?`<span style="margin-left:10px;color:var(--t3);border-left:1px solid var(--border2);padding-left:10px">prev ${last} kg</span>`:''}</div></div><button class="btn" onclick="event.stopPropagation();cL(${ei})" style="font-size:10px;padding:5px 10px">↻</button></div>`;
    h+=`<div style="padding:0 16px 8px 42px"><div style="font-size:11px;color:var(--t5);line-height:1.5;font-style:italic">${ex.notes}</div></div>`;
    h+=`<div class="set-grid" style="font-size:9px;letter-spacing:.16em;color:var(--t5);font-weight:600"><div>#</div><div>KG</div><div>REPS</div><div style="text-align:center">✓</div></div>`;
    sets.forEach((s,si)=>{h+=`<div class="set-grid ${s.done?'done':''}"><div style="font-size:12px;color:var(--t4);text-align:center;font-weight:600;font-family:var(--mono)">${si+1}</div><input type="text" placeholder="kg" value="${s.weight}" onchange="uS(${ei},${si},'weight',this.value)" style="text-align:center;font-size:14px"><input type="text" placeholder="${ex.reps}" value="${s.reps}" onchange="uS(${ei},${si},'reps',this.value)" style="text-align:center;font-size:14px"><div style="display:flex;justify-content:center"><button class="check-btn ${s.done?'checked':''}" style="color:${s.done?day.color:'var(--border2)'};border-color:${s.done?day.color:'var(--border)'}" onclick="tD(${ei},${si})">${s.done?'✓':''}</button></div></div>`;});
    if(isE&&hist.length){h+=`<div style="padding:10px 16px 12px;border-top:1px solid var(--border)"><div style="font-size:9px;letter-spacing:.14em;color:var(--t4);margin-bottom:6px;font-weight:600">HISTORY</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;hist.forEach(x=>{h+=`<span class="hist-pill">${fD(x.date)}: ${x.w}kg×${x.r}</span>`;});h+=`</div></div>`;}
    h+=`</div>`;});

  h+=`<div class="section-head"><div class="section-tag">8-WEEK PLAN</div><div class="section-title">CYCLE TIMELINE</div></div><div style="padding:0 24px 40px">`;
  CYCLE_WEEKS.forEach((w,i)=>{const isCurrent=cy.week===w.week;
    h+=`<div class="card" style="margin-bottom:8px;${isCurrent?'border-color:var(--yellow)':''}"><div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><div style="width:28px;height:28px;border-radius:6px;background:${i<cy.week-1?'var(--green)18':isCurrent?'var(--yellow)18':'var(--bg3)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${i<cy.week-1?'var(--green)':isCurrent?'var(--yellow)':'var(--t5)'}">${i<cy.week-1?'✓':w.week}</div><div><div style="font-size:13px;font-weight:600;color:${isCurrent?'var(--t1)':'var(--t3)'}">${w.title}</div><div style="font-size:10px;color:var(--t4)">Week ${w.week}</div></div></div>${isCurrent?'<span style="font-size:9px;padding:3px 8px;border-radius:4px;background:var(--yellow)18;color:var(--yellow);font-weight:600;letter-spacing:.08em">NOW</span>':''}</div></div>`;
  });
  h+=`</div>`;
  document.getElementById('tab-cycle').innerHTML=h;
}

// ════════════════════ JOURNAL ════════════════════
function rJournal(){
  const cy=cyc(),ex=S.journal[S.journalDate];
  if(ex&&!S.journalDraft._ld){S.journalDraft={text:ex.text||'',mood:ex.mood||'',type:ex.type||'daily',_ld:true};}
  if(!ex&&S.journalDraft._ld){S.journalDraft={text:'',mood:'',type:'daily',_ld:false};}
  let h=`<div style="border-bottom:1px solid var(--border);padding:24px"><div style="font-size:10px;letter-spacing:.2em;color:var(--t4);font-weight:600">REFLECT & TRACK</div><div style="font-family:var(--display);font-size:clamp(28px,5vw,40px);line-height:1;margin-top:4px">JOURNAL</div></div>`;
  h+=`<div class="section-head"><div class="section-tag">NEW ENTRY</div><div class="section-title">HOW WAS TODAY?</div></div>`;
  h+=`<div style="padding:0 24px 16px"><div style="display:flex;gap:10px;margin-bottom:12px"><input type="date" value="${S.journalDate}" onchange="S.journalDate=this.value;S.journalDraft={text:'',mood:'',type:'daily',_ld:false};rJournal()" style="width:148px;font-size:12px;padding:7px 10px;background:var(--bg2)"><span style="font-size:12px;color:var(--t4);align-self:center">${fDow(S.journalDate)}, ${fDF(S.journalDate)}</span></div>`;
  h+=`<div style="margin-bottom:12px"><div style="font-size:11px;color:var(--t4);font-weight:500;margin-bottom:6px">MOOD</div><div style="display:flex;gap:6px">`;['😤','😐','🙂','💪','🔥'].forEach(m=>{h+=`<button class="mood-btn ${S.journalDraft.mood===m?'selected':''}" onclick="S.journalDraft.mood='${m}';rJournal()">${m}</button>`;});
  h+=`</div></div><div style="margin-bottom:12px"><div style="font-size:11px;color:var(--t4);font-weight:500;margin-bottom:6px">TYPE</div><div style="display:flex;gap:6px"><button class="btn" style="${S.journalDraft.type==='daily'?'background:var(--bg4);color:var(--t2);border-color:var(--border3)':''}" onclick="S.journalDraft.type='daily';rJournal()">Daily</button><button class="btn" style="${S.journalDraft.type==='weekly'?'background:var(--bg4);color:var(--t2);border-color:var(--border3)':''}" onclick="S.journalDraft.type='weekly';rJournal()">Weekly</button></div></div>`;
  h+=`<textarea placeholder="${S.journalDraft.type==='weekly'?'How was the week? What went well? What needs work?':'Energy? Sleep? Pump? Joints? Diet? Notes...'}" oninput="S.journalDraft.text=this.value">${S.journalDraft.text}</textarea>`;
  h+=`<button class="btn-save" onclick="sJournal()" style="margin-top:12px">SAVE ENTRY</button></div>`;
  const entries=Object.keys(S.journal).sort().reverse().slice(0,20);
  if(entries.length){h+=`<div class="section-head"><div class="section-tag">HISTORY</div><div class="section-title">PAST ENTRIES</div></div><div style="padding:0 24px 40px">`;entries.forEach(d=>{const e=S.journal[d];h+=`<div class="journal-entry"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${e.mood||'📝'}</span><div><div style="font-size:12px;font-weight:600;color:var(--t2)">${fDow(d)}, ${fDF(d)}</div><div style="font-size:10px;color:var(--t4)">${e.type==='weekly'?'Weekly':'Daily'}</div></div></div><button class="btn" onclick="if(confirm('Delete?')){delete S.journal['${d}'];sv('ppl_j6',S.journal);rJournal();}" style="font-size:9px;padding:4px 8px;color:var(--t5)">✕</button></div><div style="font-size:12px;color:var(--t3);line-height:1.7;white-space:pre-wrap">${e.text}</div></div>`;});h+=`</div>`;}
  document.getElementById('tab-journal').innerHTML=h;
}
function sJournal(){if(!S.journalDraft.text.trim()){toast('Write something');return;}S.journal[S.journalDate]={text:S.journalDraft.text,mood:S.journalDraft.mood,type:S.journalDraft.type};sv('ppl_j6',S.journal);toast('Saved');S.journalDraft._ld=true;rJournal();}

// INIT
S.strDraft=S.strength[S.strDate]||{};S.bodyDraft=S.body[S.bodyDate]||{};
const ej=S.journal[S.journalDate];if(ej)S.journalDraft={text:ej.text||'',mood:ej.mood||'',type:ej.type||'daily',_ld:true};
rHome();
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{if(S.tab==='stats')dSG();if(S.tab==='body')dBG();},200);});
</script>
</body>
